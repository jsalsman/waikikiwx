<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waikiki Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23080e1a'/%3E%3Cpath d='M14 42h36M19 32h26M24 22h16' stroke='%2300c8ff' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080e1a;
  --panel: #0c1522;
  --border: #1a2d48;
  --accent: #00c8ff;
  --hot: #ff6b35;
  --green: #39d98a;
  --warn: #ffcc00;
  --muted: #9bb7d3;
  --text: #ddeeff;
  --mono: 'DM Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --fs: 1.6vmin;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #020609;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: var(--mono);
  color: var(--text);
}

.frame {
  --fw: min(100vw, calc(100vh * 1.7));
  --fh: calc(var(--fw) / 1.7);
  width: var(--fw);
  height: var(--fh);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  background: rgba(0,200,255,0.08);
  border-top: 1px solid rgba(0,200,255,0.2);
  border-bottom: 1px solid rgba(0,200,255,0.2);
  color: var(--accent);
}
.status-bar {
  flex-shrink: 0;
  height: 0;
  overflow: hidden;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 0.5em;
  padding: 0 2%;
  font-size: var(--fs);
  background: rgba(0, 200, 255, 0.12);
  border-top: 1px solid rgba(0, 200, 255, 0.3);
  border-bottom: 1px solid rgba(0, 200, 255, 0.3);
  color: var(--accent);
  transition: height 0.2s ease, opacity 0.2s ease;
}
.status-bar.visible {
  height: 5%;
  min-height: 1.8em;
  opacity: 1;
}
.status-bar.error {
  background: rgba(255,68,68,0.1);
  border-top: 1px solid rgba(255,68,68,0.3);
  border-bottom: 1px solid rgba(255,68,68,0.3);
  color: #ff8888;
}
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
.hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2%;
  height: 10%;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.site-id { display: flex; align-items: center; gap: 0.7em; }
.loc-icon {
  width: 2.8vmin;
  height: 2.8vmin;
  min-width: 1.4em;
  min-height: 1.4em;
  object-fit: contain;
}
.loc { font-family: var(--display); font-size: 3vmin; letter-spacing: 0.1em; color: var(--accent); }
.coords { font-size: var(--fs); color: var(--muted); margin-top: 0.15em; }
.now-wrap { display: flex; flex-direction: column; align-items: center; }
.now-grid { display: flex; gap: 2.2em; }
.now-summary {
  margin-top: 0.4em;
  text-align: center;
  font-size: calc(var(--fs) * 1.05);
  color: var(--text);
  letter-spacing: 0.04em;
}
.now-item { text-align: center; }
.now-lbl { font-size: var(--fs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.now-val { font-family: var(--display); font-size: 2.8vmin; line-height: 1.1; }
.c-hot  { color: var(--hot); }
.c-warn { color: var(--warn); }
.c-ok   { color: var(--green); }
.upd { text-align: right; }
.upd-lbl { font-size: var(--fs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.9; }
.upd-val { font-size: var(--fs); color: var(--muted); }

/* BODY */
.body { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.charts-col {
  width: 50%;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chart-panel {
  flex: 1;
  min-height: 0;
  padding: 0.8% 1.2%;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.35em;
}
.chart-panel:last-child { border-bottom: none; }
.sec-lbl {
  flex-shrink: 0;
  font-size: var(--fs);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 0.4em;
}

/* ── LEFT: 4 stacked 12-hour tables ── */
.tbl-col {
  flex-shrink: 0;
  width: 50%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
}
.block {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0.55% 1.2% 0.45% 1.6%;
  overflow: hidden;
  min-height: 0;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}
.block:last-child { border-bottom: none; }
.gif-swap-zone { position: relative; display: flex; flex-direction: column; flex: 3; min-height: 0; }
.goes-overlay {
  position: absolute; top: 5px; left: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; opacity: 0; transition: opacity 0.5s;
  pointer-events: none;
}
.gif-swap-zone.show-gif .goes-overlay { opacity: 0.7; }
.gif-swap-zone.show-gif .block { background: transparent !important; }
.goes-wrap {
  width: 100%;
  height: 100%;
  padding: 1.5%;
  display: flex;
  flex-direction: column;
  gap: 0.4em;
}
.goes-title {
  font-size: var(--fs);
  color: var(--text);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.goes-time {
  color: var(--muted);
}
.goes-overlay img {
  width: 100%;
  min-height: 0;
  flex: 1;
  object-fit: contain;
  border: 1px solid var(--border);
}
.blk-lbl {
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 0.6em;
  margin-bottom: 0.3em;
}
.blk-tag {
  font-size: var(--fs);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.13em;
  display: flex;
  align-items: center;
  gap: 0.4em;
}
.blk-tag::before {
  content: '';
  display: inline-block;
  width: 1em; height: 1px;
  background: var(--accent); opacity: 0.5;
}
.blk-date { font-family: var(--display); font-size: 1.6vmin; color: var(--text); letter-spacing: 0.07em; }
.blk-span { font-size: var(--fs); color: var(--muted); opacity: 0.95; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
table colgroup col.rl { width: 12%; }
table colgroup col    { width: calc(88% / 12); }
th, td {
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  padding: 0.2em 0.35em 0.2em 0;
  font-size: var(--fs);
}
th { color: var(--muted); font-weight: 400; font-size: var(--fs); }
th.rl, td.rl {
  text-align: left;
  color: var(--muted);
  font-size: var(--fs);
  font-weight: 500;
  padding-left: 0;
}
td { border-top: 1px solid rgba(26,45,72,0.45); }
thead tr th { border-top: none; }
.nc {
  background: rgba(0,200,255,0.09);
  border-left: 1px solid rgba(0,200,255,0.2) !important;
  border-right: 1px solid rgba(0,200,255,0.2) !important;
  margin-bottom: 0.3em;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.4em;
}
.chart-panel .sec-lbl::before {
  content: '';
  display: inline-block;
  width: 1em; height: 1px;
  background: var(--accent); opacity: 0.5;
}
.chart-panel svg { flex: 1; width: 100%; min-height: 0; display: block; overflow: visible; }

/* ── FOOTER ── */
.ftr {
  flex-shrink: 0;
  height: 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2%;
  background: var(--panel);
  border-top: 1px solid var(--border);
}
.ftr-src { flex: 1; font-size: var(--fs); color: var(--muted); opacity: 0.82; letter-spacing: 0.05em; text-align: left; word-break: break-word; }
.ftr-next { flex: 1; font-size: var(--fs); color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 0.5em; }
.ftr-fork { flex: 1; font-size: var(--fs); color: var(--muted); opacity: 0.82; letter-spacing: 0.05em; text-align: right; word-break: break-word; }
.pulse {
  width: 0.5vmin; height: 0.5vmin; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.2;transform:scale(0.6);} }

@media (max-width: 900px) and (orientation: portrait) {
  html, body { overflow: auto; display: block; }
  .frame {
    width: 100vw;
    height: auto;
    min-height: 100vh;
    --fw: 100vw;
    --fh: auto;
  }
  .body {
    flex-direction: column;
    overflow: visible;
  }
  .charts-col { order: 1; width: 100%; }
  .tbl-col {
    order: 2;
    width: 100%;
    border-right: none;
    border-top: 1px solid var(--border);
  }
  .chart-panel { min-height: 15vh; }
  .block { min-height: auto; flex: none; }
  .gif-swap-zone { padding-bottom: 25vh; }
  .ftr { min-height: 3.4em; flex-wrap: wrap; height: auto; }
  .site-id { margin-bottom: 0.2em; }
  .now-summary { margin-bottom: 0.2em; }
}
</style>
</head>
<body>
<div class="frame">

  <div class="status-bar" id="status-bar">
    <span id="status-icon"></span>
    <span id="status-msg"></span>
  </div>

  <div class="hdr">
    <div>
      <div class="site-id">
        <img class="loc-icon" id="loc-icon" alt="Current weather icon">
        <div class="loc">WAIKIKI</div>
      </div>
      <div class="coords">21.31°N 157.86°W · 48 HOUR forecast</div>
    </div>
    <div class="now-wrap">
      <div class="now-grid">
        <div class="now-item">
          <div class="now-lbl">Hour</div>
          <div class="now-val" id="now-hour">—<span style="font-size:0.45em;color:var(--muted)">HST</span></div>
        </div>
        <div class="now-item">
          <div class="now-lbl">Temp °F</div>
          <div class="now-val" id="now-temp">—</div>
        </div>
        <div class="now-item">
          <div class="now-lbl">Precip %</div>
          <div class="now-val" id="now-precip">—</div>
        </div>
        <div class="now-item">
          <div class="now-lbl">Wind mph</div>
          <div class="now-val" id="now-wind">—</div>
        </div>
        <div class="now-item">
          <div class="now-lbl">Wind Dir</div>
          <div class="now-val" id="now-dir">—</div>
        </div>
      </div>
      <div class="now-summary" id="now-summary">—</div>
    </div>
    <div class="upd">
      <div class="upd-lbl">Last updated</div>
      <div class="upd-val" id="upd-time">—</div>
    </div>
  </div>

  <div class="body">
    <div class="tbl-col" id="tbl-col"></div>
    <div class="charts-col">
      <div class="chart-panel">
        <div class="sec-lbl">Temperature (°F)</div>
        <svg id="cTemp" style="width:100%; height:100%;"></svg>
      </div>
      <div class="chart-panel">
        <div class="sec-lbl">Precipitation (%)</div>
        <svg id="cPrecip" style="width:100%; height:100%;"></svg>
      </div>
      <div class="chart-panel">
        <div class="sec-lbl">Wind Speed (mph)</div>
        <svg id="cWind" style="width:100%; height:100%;"></svg>
      </div>
    </div>
  </div>

  <div class="ftr">
    <div class="ftr-src">NOAA / NWS HONOLULU · <a href="https://forecast.weather.gov" style="color: inherit; text-decoration: underline;">forecast.weather.gov</a></div>
    <div class="ftr-next">
      <div class="pulse"></div>
      NEXT UPDATE <span id="cd">10:00</span>
    </div>
    <div class="ftr-fork"><a href="https://paypal.me/jsalsman" style="color: inherit; text-decoration: underline;">DONATE</a> and/or fork: <a href="https://github.com/jsalsman/waikikiwx" style="color: inherit; text-decoration: underline;">github.com/jsalsman/waikikiwx</a></div>
  </div>

</div>
<script>
'use strict';

const initialData = {{ data | tojson | safe if data else 'null' }};

// ── CONFIG ────────────────────────────────────────────────────
// Flask serves /forecast as JSON — same origin, no CORS needed.
const UPDATE_INTERVAL_MS = 10 * 60 * 1000;

// ── STATUS BAR ───────────────────────────────────────────────
const statusBar  = document.getElementById('status-bar');
const statusIcon = document.getElementById('status-icon');
const statusMsg  = document.getElementById('status-msg');
let   statusTimer = null;

function showStatus(type, msg, autohideMs = 0) {
  clearTimeout(statusTimer);
  statusBar.className    = `status-bar visible ${type}`;
  statusIcon.textContent = type === 'fetching' ? '↻' : '⚠';
  statusIcon.className   = type === 'fetching' ? 'spin' : '';
  statusMsg.textContent  = msg;
  if (autohideMs) {
    statusTimer = setTimeout(() => { statusBar.className = 'status-bar'; }, autohideMs);
  }
}
function hideStatus() {
  clearTimeout(statusTimer);
  statusBar.className = 'status-bar';
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchWeatherData() {
  const response = await fetch('/forecast');
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  if (!data.hour || !data.hour.length) throw new Error('Empty forecast data');
  return data;
}

// ── TABLE RENDERING ───────────────────────────────────────────
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function fmtDate(d) {
  return `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function fmtHour(h) {
  if (h === 0)  return '12AM';
  if (h < 12)   return h + 'AM';
  if (h === 12) return '12PM';
  return (h - 12) + 'PM';
}

function makeBlock(slice, label, span, nowIdx) {
  const block = document.createElement('div');
  block.className = 'block';
  block.innerHTML = `
    <div class="blk-lbl">
      <div class="blk-tag">Forecast</div>
      <div class="blk-date">${label}</div>
      <div class="blk-span">${span}</div>
    </div>`;
  const table = document.createElement('table');
  const cg    = document.createElement('colgroup');
  const rlCol = document.createElement('col');
  rlCol.className = 'rl';
  cg.appendChild(rlCol);
  for (let i = 0; i < 12; i++) cg.appendChild(document.createElement('col'));
  table.appendChild(cg);

  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  const thRl  = document.createElement('th');
  thRl.className = 'rl'; thRl.textContent = 'Hour';
  hrow.appendChild(thRl);
  slice.hour.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (i === nowIdx) th.className = 'nc';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  [
    { label: 'Temp',   key: 'temp'      },
    { label: 'Precip', key: 'precip'    },
    { label: 'Wind',   key: 'speed'     },
    { label: 'Dir',    key: 'direction' },
  ].forEach(({ label: rl, key }) => {
    const tr   = document.createElement('tr');
    const tdRl = document.createElement('td');
    tdRl.className = 'rl'; tdRl.textContent = rl;
    tr.appendChild(tdRl);
    slice[key].forEach((v, i) => {
      const td  = document.createElement('td');
      td.textContent = v;
      const cls = [];
      if (i === nowIdx)                cls.push('nc');
      if (key === 'speed'  && v > 35)  cls.push('cw');
      if (key === 'precip' && v > 50)  cls.push('cw');
      if (key === 'temp'   && v >= 75) cls.push('ch');
      if (key === 'precip' && v <= 20) cls.push('co');
      if (cls.length) td.className = cls.join(' ');
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  block.appendChild(table);
  return block;
}

function renderTables(data) {
  const col      = document.getElementById('tbl-col');
  col.innerHTML  = '';
  const sliceLen  = 12;
  const numSlices = Math.floor(data.hour.length / sliceLen);

  const hstNow = new Date(
    new Date().toLocaleString('en-US', { timeZone: 'Pacific/Honolulu' })
  );
  let cursor = new Date(hstNow);
  cursor.setHours(data.hour[0], 0, 0, 0);

  const lowerZone = document.createElement('div');
  lowerZone.className = 'gif-swap-zone';

  for (let s = 0; s < numSlices; s++) {
    const start = s * sliceLen;
    const slice = {
      hour:      data.hour     .slice(start, start + sliceLen),
      direction: data.direction.slice(start, start + sliceLen),
      speed:     data.speed    .slice(start, start + sliceLen),
      temp:      data.temp     .slice(start, start + sliceLen),
      precip:    data.precip   .slice(start, start + sliceLen),
    };

    const startDate = new Date(cursor);
    const endCursor = new Date(cursor);
    endCursor.setHours(endCursor.getHours() + sliceLen - 1);
    const crossDay  = startDate.getDate() !== endCursor.getDate();
    const span      = crossDay
      ? `${fmtHour(slice.hour[0])} – ${DAYS[endCursor.getDay()]} ${fmtHour(slice.hour[sliceLen - 1])}`
      : `${fmtHour(slice.hour[0])} – ${fmtHour(slice.hour[sliceLen - 1])}`;

    const block = makeBlock(slice, fmtDate(startDate), span, s === 0 ? 0 : -1);
    if (s < 1) col.appendChild(block);
    else lowerZone.appendChild(block);
    cursor.setHours(cursor.getHours() + sliceLen);
  }

  col.appendChild(lowerZone);
  attachGoesOverlay(lowerZone);
}

let goesOverlayTimer = null;
let goesSectorIndex = 0;
const GOES_SECTOR_ORDER = ['hi', 'tpw'];
const GOES_SECTOR_LABELS = {
  hi: 'Hawaii',
  tpw: 'Tropical Pacific West',
};

function attachGoesOverlay(parent) {
  const overlay = document.createElement('div');
  overlay.className = 'goes-overlay';
  overlay.innerHTML = `
    <div class="goes-wrap">
      <div class="goes-title" id="goes-title">GOES West Air Mass <span class="goes-time" id="goes-time">loading…</span></div>
      <img id="goes-img" alt="Latest GOES West Hawaii Air Mass animation">
    </div>`;
  parent.appendChild(overlay);
  clearTimeout(goesOverlayTimer);

  function cycleOverlay() {
    refreshGoesImage();
    parent.classList.add('show-gif');
    goesOverlayTimer = setTimeout(() => {
      parent.classList.remove('show-gif');
      goesOverlayTimer = setTimeout(cycleOverlay, 5000); // 5s off
    }, 10000); // 10s on
  }

  cycleOverlay();
}

async function fetchGoesAirmassUrl() {
  const response = await fetch('/goes-airmass');
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  if (data.error || !data.urls) throw new Error(data.error || 'Missing GOES URLs');
  return data.urls;
}

async function refreshGoesImage() {
  const goesImg = document.getElementById('goes-img');
  const goesTime = document.getElementById('goes-time');
  const goesTitle = document.getElementById('goes-title');
  if (!goesImg || !goesTime || !goesTitle) return;
  try {
    const urls = await fetchGoesAirmassUrl();
    const currentSector = GOES_SECTOR_ORDER[goesSectorIndex % GOES_SECTOR_ORDER.length];
    const url = urls[currentSector];
    if (!url) throw new Error(`Missing GOES URL for sector ${currentSector}`);
    goesImg.src = `${url}${url.includes('?') ? '&' : '?'}t=${Date.now()}`;
    const sectorLabel = GOES_SECTOR_LABELS[currentSector] || currentSector.toUpperCase();
    goesTitle.childNodes[0].textContent = `GOES West ${sectorLabel} Air Mass `;
    goesTime.textContent = `· ${new Date().toLocaleTimeString('en-US', { timeZone: 'Pacific/Honolulu', hour: 'numeric', minute: '2-digit' })} HST`;
    goesSectorIndex += 1;
  } catch (err) {
    console.error('[goes] fetch failed:', err);
    goesTime.textContent = '· unavailable';
  }
}

// ── SVG CHARTS ────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const MONO   = 'DM Mono, monospace';

function svgEl(tag, attrs) {
  const n = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
  return n;
}
function svgTxt(parent, text, x, y, size, fill, anchor) {
  const t = svgEl('text', { x, y, 'font-size': size, fill,
    'text-anchor': anchor || 'middle', 'font-family': MONO });
  t.textContent = text;
  parent.appendChild(t);
}

function drawChart(id, W, H, data, defaultMn, defaultMx, opts = {}) {
  const svg = document.getElementById(id);
  svg.innerHTML = '';
  // Use actual container dimensions if W/H not accurate
  const rect = svg.parentElement.getBoundingClientRect();
  W = rect.width;
  // Subtracting header height roughly
  H = rect.height - 24;
  if (W === 0 || H <= 0) {
    W = svg.clientWidth || 300;
    H = svg.clientHeight || 100;
  }

  // Create an internal viewBox so resizing works fluidly
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');

  const N = data.length;
  // Professional padding
  const PL = 36, PR = 16, PT = 16, PB = 20;
  const cW = W - PL - PR;
  const cH = H - PT - PB;

  // Calculate dynamic ticks
  let min = Math.min(...data, defaultMn);
  let max = Math.max(...data, defaultMx);
  if (min === max) { min -= 1; max += 1; }

  // Custom domains for specific charts for better aesthetics
  if (id === 'cPrecip') {
      min = 0;
      max = Math.max(100, max);
  } else if (id === 'cWind') {
      min = 0;
      max = Math.max(40, max);
  }

  const range = max - min;
  let roughStep = range / 3; // Target ~4 ticks
  if (id === 'cPrecip') roughStep = 25; // Force 0, 25, 50, 75, 100

  const mag = Math.pow(10, Math.floor(Math.log10(roughStep || 1)));
  const norm = roughStep / mag;
  let step = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  step *= mag;

  if (id === 'cPrecip') step = 25; // Lock it in

  const minTick = Math.floor(min / step) * step;
  const maxTick = Math.ceil(max / step) * step;

  const ticks = [];
  for (let t = minTick; t <= maxTick + 1e-9; t += step) {
    ticks.push(t);
  }

  // Update effective min/max for scaling
  const graphMin = minTick;
  const graphMax = maxTick;

  const xp = i => PL + i * (cW / (N - 1));
  // Provide a safe division in case maxTick == minTick
  const denom = (graphMax - graphMin) || 1;
  const yp = v => PT + cH - ((v - graphMin) / denom) * cH;

  // Draw Grid lines and Y-axis labels
  ticks.forEach(tick => {
    const y = yp(tick);
    // Grid line
    svg.appendChild(svgEl('line', {
      x1: PL, y1: y, x2: W - PR, y2: y,
      stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1
    }));
    // Label
    svgTxt(svg, tick, PL - 8, y + 4, 11, '#9bb7d3', 'end');
  });

  // Draw X-axis labels
  // Draw day separators
  if (opts.dayChangeIndices) {
    opts.dayChangeIndices.forEach(i => {
      const x = xp(i);
      svg.appendChild(svgEl('line', {
        x1: x, y1: PT, x2: x, y2: PT + cH,
        stroke: 'rgba(255,255,255,0.2)', 'stroke-width': 1, 'stroke-dasharray': '4,4'
      }));
    });
  }

  // Draw X-axis labels
  if (opts.xLabels) {
    // Determine a safe step for X labels to avoid overlap
    const labelWidthEstimate = 20;
    const maxLabels = Math.floor(cW / labelWidthEstimate);
    const xStep = Math.ceil(N / maxLabels);

    opts.xLabels.forEach((lbl, i) => {
      if (lbl && (i % xStep === 0 || i === N - 1)) {
        svgTxt(svg, lbl, xp(i), H - 4, 10, '#9bb7d3');
      }
    });
  }

  // Draw Data
  if (opts.bars) {
    const bW = (cW / N) * 0.7;
    data.forEach((v, i) => {
      const x = xp(i) - bW / 2;
      const y = yp(v);
      const bh = (PT + cH) - y;
      if (bh <= 0) return;
      const fill = v >= 50 ? '#ff4444' : v >= 30 ? '#ffcc00' : '#00c8ff';
      svg.appendChild(svgEl('rect', { x, y, width: bW, height: bh, fill, rx: 1, opacity: 0.85 }));
    });
  } else {
    const lineD = data.map((v, i) =>
      `${i === 0 ? 'M' : 'L'}${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');
    const areaD = lineD + ` L${xp(N-1).toFixed(1)},${PT + cH} L${xp(0).toFixed(1)},${PT + cH} Z`;

    // Solid fill with opacity
    svg.appendChild(svgEl('path', { d: areaD, fill: opts.areaColor || 'rgba(0,200,255,0.1)', stroke: 'none' }));
    svg.appendChild(svgEl('path', { d: lineD, fill: 'none', stroke: opts.lineColor || '#00c8ff',
      'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
  }
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll(data) {
  const nowIcon = (data.icon && data.icon[0]) || '';
  const shortForecast = (data.short && data.short[0]) || '';

  document.getElementById('now-hour').childNodes[0].textContent = data.hour[0];
  document.getElementById('now-dir')   .textContent = data.direction[0];
  document.getElementById('now-wind')  .textContent = data.speed[0];
  document.getElementById('now-temp')  .textContent = data.temp[0];
  document.getElementById('now-precip').textContent = data.precip[0];
  document.getElementById('now-summary').textContent = shortForecast || '—';

  document.getElementById('now-wind')  .className = 'now-val' + (data.speed[0]  > 35  ? ' c-warn' : '');
  document.getElementById('now-temp')  .className = 'now-val' + (data.temp[0]   >= 75 ? ' c-hot'  : '');
  document.getElementById('now-precip').className = 'now-val' + (data.precip[0] > 50  ? ' c-warn' : ' c-ok');

  if (nowIcon) {
    const locIconEl = document.getElementById('loc-icon');
    const faviconEl = document.querySelector('link[rel="icon"]');
    
    const proxyUrl = `/icon?url=${encodeURIComponent(nowIcon)}`;
    locIconEl.src = proxyUrl;
    
    if (faviconEl) {
      faviconEl.href = proxyUrl;
      faviconEl.type = 'image/png';
    }
  }

  document.getElementById('upd-time').textContent = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Pacific/Honolulu',
    hour: 'numeric', minute: '2-digit', hour12: true,
    month: 'short', day: 'numeric',
  }).format(new Date()) + ' HST';

  renderTables(data);

  const xLabels = data.hour.map(h =>
    h === 0 ? '12A' : h < 12 ? h + 'A' : h === 12 ? '12P' : (h - 12) + 'P'
  );
  const dayChangeIndices = [];
  data.hour.forEach((h, i) => { if (i > 0 && h === 0) dayChangeIndices.push(i); });
  const cW = document.getElementById('cTemp').clientWidth || 260;
  const cH = document.getElementById('cTemp').clientHeight || 78;

  drawChart('cTemp',   cW, cH, data.temp,   55, 85,
    { lineColor:'#ff6b35', areaColor:'rgba(255,107,53,0.08)', xLabels, dayChangeIndices });
  drawChart('cPrecip', cW, cH, data.precip,  0, 100,
    { bars:true, xLabels, dayChangeIndices });
  drawChart('cWind',   cW, cH, data.speed,   0,  40,
    { lineColor:'#39d98a', areaColor:'rgba(57,217,138,0.07)', warnAt:35, xLabels, dayChangeIndices });
}

let currentData = null;

window.addEventListener('resize', () => {
  if (currentData) renderAll(currentData);
});

// ── UPDATE LOOP ───────────────────────────────────────────────
async function update() {
  showStatus('fetching', 'FETCHING LATEST FORECAST…');
  try {
    const data = await fetchWeatherData();
    currentData = data;
    renderAll(data);
    hideStatus();
  } catch (err) {
    console.error('[weather] fetch failed:', err);
    showStatus('error', `FETCH FAILED — DISPLAYING LAST KNOWN VALUES (${err.message})`, 8000);
  }
}

// ── COUNTDOWN ─────────────────────────────────────────────────
let secsLeft = UPDATE_INTERVAL_MS / 1000;
const cdEl   = document.getElementById('cd');

setInterval(() => {
  secsLeft = Math.max(0, secsLeft - 1);
  cdEl.textContent =
    String(Math.floor(secsLeft / 60)).padStart(2, '0') + ':' +
    String(secsLeft % 60).padStart(2, '0');
}, 1000);

setInterval(() => {
  secsLeft = UPDATE_INTERVAL_MS / 1000;
  update();
}, UPDATE_INTERVAL_MS);

setInterval(refreshGoesImage, 10 * 60 * 1000);

if (initialData) {
  currentData = initialData;
  renderAll(initialData);
  hideStatus();
} else {
  update();
}
</script>
